<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Certificat - {{ certificat.titre }}</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    text-align: center;
    background: #f0f4f8;
    padding: 50px;
}
.certificat {
    border: 15px solid #0d6efd;
    border-radius: 20px;
    background: white;
    padding: 60px;
    position: relative;
}
h1 {
    color: #0d6efd;
    font-size: 50px;
    margin-bottom: 10px;
}
h2 {
    color: #333;
    font-size: 36px;
    margin-bottom: 30px;
}
.nom {
    font-size: 40px;
    font-weight: bold;
    margin-bottom: 20px;
}
.details {
    font-size: 22px;
    margin-top: 30px;
}
.footer {
    margin-top: 60px;
    font-size: 16px;
    color: #555;
}
.qr {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 120px;
    height: 120px;
}
</style>
</head>
<body>

<div class="certificat">
    <h1>Certificat de réussite</h1>
    <h2>{{ certificat.titre }}</h2>
    <div class="nom">{{ resultat.nom_etudiant }}</div>
    <div class="details">
        A réussi le test avec un score de {{ resultat.score }} / {{ resultat.certificat.question_set.count }}
    </div>
    <img src="{{ qr_base64 }}" class="qr" alt="QR Code de vérification">
    <div class="footer">
        Généré automatiquement par {{ home_data.site_name }}
    </div>
</div>

</body>
</html>
